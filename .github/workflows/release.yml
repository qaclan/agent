name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    container:
      image: python:3.11-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update && apt-get install -y gcc g++ ccache binutils patchelf
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/.ccache
          key: nuitka-linux-amd64-${{ hashFiles('qaclan.py', 'cli/**', 'web/**') }}
          restore-keys: nuitka-linux-amd64-

      - name: Build binary
        env:
          CCACHE_DIR: ~/.ccache
        run: bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaclan-linux-amd64
          path: dist/qaclan-linux-amd64

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    container:
      image: python:3.11-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update && apt-get install -y gcc g++ ccache binutils patchelf
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/.ccache
          key: nuitka-linux-arm64-${{ hashFiles('qaclan.py', 'cli/**', 'web/**') }}
          restore-keys: nuitka-linux-arm64-

      - name: Build binary
        env:
          CCACHE_DIR: ~/.ccache
        run: bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaclan-linux-arm64
          path: dist/qaclan-linux-arm64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Nuitka
          key: nuitka-macos-${{ hashFiles('qaclan.py', 'cli/**', 'web/**') }}
          restore-keys: nuitka-macos-

      - name: Build binary
        run: bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaclan-macos-arm64
          path: dist/qaclan-macos-arm64

  build-windows-amd64:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-windows-amd64-${{ hashFiles('qaclan.py', 'cli/**', 'web/**') }}
          restore-keys: nuitka-windows-amd64-

      - name: Build binary
        run: |
          python -m nuitka --onefile `
            --output-filename=qaclan-windows-amd64.exe `
            --output-dir=dist `
            --jobs=$env:NUMBER_OF_PROCESSORS `
            --lto=no `
            --assume-yes-for-downloads `
            --nofollow-import-to=tkinter,unittest,test,setuptools,pip,distutils,pydoc,doctest,xmlrpc,lib2to3,ensurepip,idlelib,turtle `
            --include-package=rich `
            --include-data-dir=web/static=web/static `
            --windows-console-mode=force `
            qaclan.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaclan-windows-amd64
          path: dist/qaclan-windows-amd64.exe

  build-windows-arm64:
    runs-on: windows-11-arm
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: arm64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --only-binary=:all: -r requirements.txt
          pip install --only-binary=:all: nuitka ordered-set zstandard

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-windows-arm64-${{ hashFiles('qaclan.py', 'cli/**', 'web/**') }}
          restore-keys: nuitka-windows-arm64-

      - name: Build binary
        run: |
          python -m nuitka --onefile `
            --output-filename=qaclan-windows-arm64.exe `
            --output-dir=dist `
            --jobs=$env:NUMBER_OF_PROCESSORS `
            --lto=no `
            --assume-yes-for-downloads `
            --nofollow-import-to=tkinter,unittest,test,setuptools,pip,distutils,pydoc,doctest,xmlrpc,lib2to3,ensurepip,idlelib,turtle `
            --include-package=rich `
            --include-data-dir=web/static=web/static `
            --windows-console-mode=force `
            qaclan.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaclan-windows-arm64
          path: dist/qaclan-windows-arm64.exe

  release:
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-macos
      - build-windows-amd64
      - build-windows-arm64
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: false
