name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: python:3.11-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update && apt-get install -y gcc g++ ccache binutils patchelf
          pip install -r requirements.txt
          pip install nuitka ordered-set

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/.ccache
          key: nuitka-linux-${{ hashFiles('qaclan.py', 'cli/**', 'web/**') }}
          restore-keys: nuitka-linux-

      - name: Build binary
        env:
          CCACHE_DIR: ~/.ccache
        run: bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaclan-linux-amd64
          path: dist/qaclan-linux-amd64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka ordered-set

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Nuitka
          key: nuitka-macos-${{ hashFiles('qaclan.py', 'cli/**', 'web/**') }}
          restore-keys: nuitka-macos-

      - name: Build binary
        run: bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaclan-macos-arm64
          path: dist/qaclan-macos-arm64

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
